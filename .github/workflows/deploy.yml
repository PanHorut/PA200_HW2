# .github/workflows/deploy.yml
# CI/CD pipeline: Deploy Flask app to Azure App Service
#                 + upload static assets to Azure Blob Storage

name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Package the application for deployment
      - name: Create deployment package
        run: |
          zip -r deploy.zip . -x ".git/*" ".github/*" ".env" "*.pyc" "__pycache__/*" "uploads/*" ".venv/*"

      # 5. Deploy to Azure App Service
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip

      # 6. Upload static files to Azure Blob Storage
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload static assets to Blob Storage
        uses: azure/cli@v2
        with:
          inlineScript: |
            az storage blob upload-batch \
              --account-name ${{ vars.AZURE_STORAGE_ACCOUNT }} \
              --destination static \
              --source static/ \
              --overwrite \
              --auth-mode login
