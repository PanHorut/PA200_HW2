# .github/workflows/deploy.yml
# CI/CD pipeline: Deploy Flask app to Azure App Service
#                 + upload static assets to Azure Blob Storage

name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Create deployment package
      - name: Create deployment package
        run: |
          zip -r deploy.zip . -x ".git/*" ".github/*" ".env" "*.pyc" "__pycache__/*" "uploads/*" ".venv/*"

      # 5. Deploy to Azure App Service
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip

      # 6. Upload static files to Azure Blob Storage
      - name: Upload static assets to Blob Storage
        run: |
          pip install azure-storage-blob
          python -c "
          from azure.storage.blob import BlobServiceClient, ContentSettings
          import os, mimetypes

          account = '${{ vars.AZURE_STORAGE_ACCOUNT }}'
          key = '${{ secrets.AZURE_STORAGE_KEY }}'
          client = BlobServiceClient(f'https://{account}.blob.core.windows.net', credential=key)
          container = client.get_container_client('static')

          for root, dirs, files in os.walk('static'):
              for f in files:
                  local_path = os.path.join(root, f)
                  blob_name = os.path.relpath(local_path, 'static').replace(os.sep, '/')
                  content_type = mimetypes.guess_type(local_path)[0] or 'application/octet-stream'
                  with open(local_path, 'rb') as data:
                      container.upload_blob(blob_name, data, overwrite=True,
                          content_settings=ContentSettings(content_type=content_type))
                  print(f'Uploaded: {blob_name}')
          "